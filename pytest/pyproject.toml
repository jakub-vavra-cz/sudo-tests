[tool.ruff]
line-length = 119
target-version = "py312"
extend-exclude = ["docs"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
]
extend-ignore = []

[tool.ruff.lint.isort]
required-imports = ["from __future__ import annotations"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
exclude = "docs"

[[tool.mypy.overrides]]
module = "jc.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ldap.*"
ignore_missing_imports = true

[tool.isort]
line_length = 119
profile = "black"
add_imports = "from __future__ import annotations"

[tool.black]
line-length = 119
